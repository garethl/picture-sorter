[package]
name = "picture-sorter"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = "1.0"
chrono = "0.4.22"
clap = { version = "4.0", features=["derive"] }
dateparser = "0.1.7"
dpc-pariter = "0.5.1"
interim = { version = "0.1.0", features = ["chrono"] }
lazy_static = "1.4.0"
log = "0.4"
log4rs = "1.2"
regex = "1.6.0"
serde = { version = "1.0.147", features = ["derive"] }
serde_json = "1.0.87"
unicase = "2.6.0"
walkdir = "2.3.2"
rusqlite = { version = "0.28.0", features = ["bundled"] }
r2d2_sqlite = "0.21.0"
r2d2 = "0.8.10"
deadpool = "0.9.5"
thiserror = "1.0.37"
